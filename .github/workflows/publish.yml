name: Publish to NPM & Crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin_name: orion.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: orion
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: orion
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            bin_name: orion
          - target: aarch64-apple-darwin
            os: macos-latest
            bin_name: orion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Zig
        if: ${{ matrix.use_zigbuild }}
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild }}
        run: pip install cargo-zigbuild

      - name: Build Binary (Standard)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Binary (Zigbuild)
        if: ${{ matrix.use_zigbuild }}
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.bin_name }}
            target/${{ matrix.target }}/release/update_titles.exe
            target/${{ matrix.target }}/release/update_titles
          if-no-files-found: ignore

  publish-npm:
    name: Publish NPM Packages
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
          scope: '@chiro14'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-npm
        run: cargo install cargo-npm

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: target-artifacts

      # Move downloaded binaries back to target/<triple>/release/
      # so cargo-npm generate can detect them.
      - name: Structure Target Binaries
        run: |
          mkdir -p target/x86_64-pc-windows-msvc/release
          mkdir -p target/x86_64-unknown-linux-gnu/release
          mkdir -p target/aarch64-unknown-linux-gnu/release
          mkdir -p target/x86_64-apple-darwin/release
          mkdir -p target/aarch64-apple-darwin/release

          cp target-artifacts/binary-x86_64-pc-windows-msvc/orion.exe target/x86_64-pc-windows-msvc/release/
          cp target-artifacts/binary-x86_64-pc-windows-msvc/update_titles.exe target/x86_64-pc-windows-msvc/release/ || true

          cp target-artifacts/binary-x86_64-unknown-linux-gnu/orion target/x86_64-unknown-linux-gnu/release/
          cp target-artifacts/binary-x86_64-unknown-linux-gnu/update_titles target/x86_64-unknown-linux-gnu/release/ || true

          cp target-artifacts/binary-aarch64-unknown-linux-gnu/orion target/aarch64-unknown-linux-gnu/release/
          cp target-artifacts/binary-aarch64-unknown-linux-gnu/update_titles target/aarch64-unknown-linux-gnu/release/ || true

          cp target-artifacts/binary-x86_64-apple-darwin/orion target/x86_64-apple-darwin/release/
          cp target-artifacts/binary-x86_64-apple-darwin/update_titles target/x86_64-apple-darwin/release/ || true

          cp target-artifacts/binary-aarch64-apple-darwin/orion target/aarch64-apple-darwin/release/
          cp target-artifacts/binary-aarch64-apple-darwin/update_titles target/aarch64-apple-darwin/release/ || true

      - name: Generate Packages
        run: cargo npm generate

      - name: Patch generated packages to use scoped names
        run: |
          SCOPE="@chiro14"
          NPM_DIR="npm"

          # Patch the main package.json optionalDependencies to use scoped names
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('${NPM_DIR}/orion-agent-cli/package.json', 'utf8'));

            // Rename the package itself
            pkg.name = '${SCOPE}/orion-agent-cli';

            // Rename optionalDependencies keys
            const oldDeps = pkg.optionalDependencies || {};
            const newDeps = {};
            for (const [key, val] of Object.entries(oldDeps)) {
              newDeps['${SCOPE}/' + key] = val;
            }
            pkg.optionalDependencies = newDeps;
            fs.writeFileSync('${NPM_DIR}/orion-agent-cli/package.json', JSON.stringify(pkg, null, 2));
            console.log('Patched main package.json');
          "

          # Patch bin/orion.js to use scoped require paths
          for jsfile in "${NPM_DIR}/orion-agent-cli/bin/"*.js; do
            sed -i "s|require\.resolve('\(orion-agent-cli[^']*\)')|require.resolve('${SCOPE}/\1')|g" "$jsfile"
            echo "Patched $jsfile"
          done

          # Rename each platform package.json name to scoped
          for platform_dir in "${NPM_DIR}"/orion-agent-cli-*/; do
            pkgfile="${platform_dir}package.json"
            if [ -f "$pkgfile" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$pkgfile', 'utf8'));
                pkg.name = '${SCOPE}/' + pkg.name;
                fs.writeFileSync('$pkgfile', JSON.stringify(pkg, null, 2));
                console.log('Patched $pkgfile -> ' + pkg.name);
              "
            fi
          done

      - name: Publish to NPM
        run: cargo npm publish -- --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

